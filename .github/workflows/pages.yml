# (v0.86.0, B5) Pages deploys ONLY the app. Deploy-from-branch served the whole repo —
# specs, STATE.md, and the question-authoring pipeline were all public URLs.
name: Deploy Pages (app only)
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble app-only artifact
        run: |
          mkdir dist
          cp index.html dist/
          touch dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
